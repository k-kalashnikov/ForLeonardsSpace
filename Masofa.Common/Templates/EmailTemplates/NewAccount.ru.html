<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добро пожаловать в систему</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
        }

        .highlight {
            background-color: #f0f8ff;
            padding: 15px;
            border-left: 4px solid #007BFF;
            margin: 20px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать, {{firstName}} {{lastName}}!</h1>
        <p>Вот ваш код безопасности для входа (действителен в течение 10 минут)</p>
        <div class="highlight">
            <strong>{{2faCode}}</strong>
        </div>
        <p>Если у вас возникнут вопросы, свяжитесь с администратором системы.</p>
    </div>
</body>
</html>
